x-orchestrator-base: &orchestrator-base
  build:
    context: .
    dockerfile: Dockerfile
  image: owned-symphony:local
  init: true
  working_dir: /app
  restart: unless-stopped
  environment:
    JIRA_EMAIL: ${JIRA_EMAIL:-}
    JIRA_API_TOKEN: ${JIRA_API_TOKEN:-}
    PLANE_API_TOKEN: ${PLANE_API_TOKEN:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    GITHUB_TOKEN: ${GITHUB_TOKEN:-}
    GH_TOKEN: ${GH_TOKEN:-}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    DATABASE_URL: ${DATABASE_URL:-}
  volumes:
    - ./config:/config:ro
    - ./workspaces:/workspaces
    - ./logs:/logs
    - ./data:/data

services:
  orchestrator-api:
    <<: *orchestrator-base
    command: ["api", "/config/WORKFLOW.md", "--host", "0.0.0.0", "--port", "4001"]
    ports:
      - "127.0.0.1:4001:4001"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:4001/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  orchestrator-worker:
    <<: *orchestrator-base
    command: ["run", "/config/WORKFLOW.md", "--poll"]
    depends_on:
      orchestrator-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "/app/dist/cli/index.js", "validate", "/config/WORKFLOW.md"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 20s

# Optional reverse proxy placeholder:
# Add a private reverse proxy in front of orchestrator-api only when you also add
# authentication and keep the public network boundary explicit.
